<svg width="480" height="220" viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">
<rect width="480" height="220" rx="16" fill="#0a1730" stroke="#1e3a5f"/>
<text x="24" y="36" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700" fill="#e2e8f0">Most Used Languages</text>

<g font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">
  <text x="24" y="66">Java</text>
  <rect x="24" y="74" width="420" height="10" rx="5" fill="#132a45"/>
  <rect x="24" y="74" height="10" rx="5" fill="#f97316" width="0"><animate attributeName="width" to="145" begin="0.3s" dur="1s" fill="freeze"/></rect>
  <text x="475" y="83" text-anchor="end" fill="#94a3b8">34%</text>

  <text x="24" y="106">Python</text>
  <rect x="24" y="114" width="420" height="10" rx="5" fill="#132a45"/>
  <rect x="24" y="114" height="10" rx="5" fill="#38bdf8" width="0"><animate attributeName="width" to="126" begin="0.45s" dur="1s" fill="freeze"/></rect>
  <text x="475" y="123" text-anchor="end" fill="#94a3b8">30%</text>

  <text x="24" y="146">C++</text>
  <rect x="24" y="154" width="420" height="10" rx="5" fill="#132a45"/>
  <rect x="24" y="154" height="10" rx="5" fill="#a78bfa" width="0"><animate attributeName="width" to="84" begin="0.6s" dur="1s" fill="freeze"/></rect>
  <text x="475" y="163" text-anchor="end" fill="#94a3b8">20%</text>

  <text x="24" y="186">PHP</text>
  <rect x="24" y="194" width="420" height="10" rx="5" fill="#132a45"/>
  <rect x="24" y="194" height="10" rx="5" fill="#22d3ee" width="0"><animate attributeName="width" to="67" begin="0.75s" dur="1s" fill="freeze"/></rect>
  <text x="475" y="203" text-anchor="end" fill="#94a3b8">16%</text>
</g>
</svg>
