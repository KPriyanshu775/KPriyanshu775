    <rect x="58" y="245" width="430" height="46" rx="10" fill="#e6f4fb" stroke="#0891b2" stroke-width="1"/>
    <text x="76" y="274" font-family="Consolas, Menlo, monospace" font-size="17" fill="#0e7490">"Code. Learn. Build. Repeat."</text>
  </g>

  <g font-family="Consolas, Menlo, monospace" font-size="15" font-weight="600">
