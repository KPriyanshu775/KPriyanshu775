<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="shineT" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect width="900" height="180" rx="16" fill="#0a1730" stroke="#1e3a5f"/>

<!-- 5 trophy cells -->
<g font-family="Consolas, Menlo, monospace">
<!-- template repeated with offsets -->
<g transform="translate(20,20)" opacity="0">
  <animate attributeName="opacity" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
  <rect width="160" height="140" rx="12" fill="#0f2135" stroke="#38bdf8"/>
  <text x="80" y="34" text-anchor="middle" font-size="13" fill="#94a3b8">Commits</text>
  <text x="80" y="80" text-anchor="middle" font-size="30" fill="#fbbf24">🏆</text>
  <text x="80" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">A</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#64748b">RANK</text>
</g>
<g transform="translate(196,20)" opacity="0">
  <animate attributeName="opacity" to="1" begin="0.4s" dur="0.4s" fill="freeze"/>
  <rect width="160" height="140" rx="12" fill="#0f2135" stroke="#38bdf8"/>
  <text x="80" y="34" text-anchor="middle" font-size="13" fill="#94a3b8">Repositories</text>
  <text x="80" y="80" text-anchor="middle" font-size="30" fill="#c0c0c0">🥈</text>
  <text x="80" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">B+</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#64748b">RANK</text>
</g>
<g transform="translate(372,20)" opacity="0">
  <animate attributeName="opacity" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
  <rect width="160" height="140" rx="12" fill="#0f2135" stroke="#38bdf8"/>
  <text x="80" y="34" text-anchor="middle" font-size="13" fill="#94a3b8">Pull Requests</text>
  <text x="80" y="80" text-anchor="middle" font-size="30" fill="#fbbf24">🏆</text>
  <text x="80" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">A-</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#64748b">RANK</text>
</g>
<g transform="translate(548,20)" opacity="0">
  <animate attributeName="opacity" to="1" begin="0.8s" dur="0.4s" fill="freeze"/>
  <rect width="160" height="140" rx="12" fill="#0f2135" stroke="#38bdf8"/>
  <text x="80" y="34" text-anchor="middle" font-size="13" fill="#94a3b8">Stars</text>
  <text x="80" y="80" text-anchor="middle" font-size="30" fill="#cd7f32">🥉</text>
  <text x="80" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">C+</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#64748b">RANK</text>
</g>
<g transform="translate(724,20)" opacity="0">
  <animate attributeName="opacity" to="1" begin="1.0s" dur="0.4s" fill="freeze"/>
  <rect width="160" height="140" rx="12" fill="#0f2135" stroke="#38bdf8"/>
  <text x="80" y="34" text-anchor="middle" font-size="13" fill="#94a3b8">Followers</text>
  <text x="80" y="80" text-anchor="middle" font-size="30" fill="#fbbf24">🏆</text>
  <text x="80" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">C</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#64748b">RANK</text>
</g>
</g>

<!-- shine sweep across whole card -->
<rect x="-200" y="-20" width="150" height="220" fill="url(#shineT)" transform="rotate(20)">
  <animateTransform attributeName="transform" type="translate" values="-30,0;1000,0;1000,0" keyTimes="0;0.5;1" dur="5s" begin="1.5s" repeatCount="indefinite"/>
</rect>
</svg>
