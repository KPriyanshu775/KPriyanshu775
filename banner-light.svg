      <rect x="60" y="315" width="82" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="78" y="336" fill="#0e7490">Python</text></g>
    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.15s" dur="0.4s" fill="freeze"/>
      <rect x="152" y="315" width="66" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="168" y="336" fill="#0e7490">C++</text></g>
    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.30s" dur="0.4s" fill="freeze"/>
      <rect x="228" y="315" width="70" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="245" y="336" fill="#0e7490">Java</text></g>
    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.45s" dur="0.4s" fill="freeze"/>
      <rect x="308" y="315" width="66" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="325" y="336" fill="#0e7490">PHP</text></g>
    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.60s" dur="0.4s" fill="freeze"/>
      <rect x="384" y="315" width="78" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="400" y="336" fill="#0e7490">Flask</text></g>
    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.75s" dur="0.4s" fill="freeze"/>
      <rect x="60" y="357" width="80" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="76" y="378" fill="#0e7490">MySQL</text></g>
    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.90s" dur="0.4s" fill="freeze"/>
      <rect x="150" y="357" width="60" height="32" rx="16" fill="#e6f4fb" stroke="#0891b2"/>
      <text x="166" y="378" fill="#0e7490">Git</text></g>
