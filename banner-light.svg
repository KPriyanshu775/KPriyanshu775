    <rect x="60" y="502" height="8" rx="4" fill="#6366f1" width="0">
      <animate attributeName="width" to="240" begin="4.7s" dur="1.2s" fill="freeze"/>
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" to="1" begin="4.9s" dur="0.5s" fill="freeze"/>
    <rect x="58" y="540" width="470" height="160" rx="14" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="80" cy="562" r="6" fill="#ef4444"/>
    <circle cx="100" cy="562" r="6" fill="#eab308"/>
    <circle cx="120" cy="562" r="6" fill="#22c55e"/>
    <g font-family="Consolas, Menlo, monospace" font-size="15">
      <text x="76" y="600" fill="#6366f1">def<tspan fill="#334155"> buildDreams():</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.1s" fill="freeze"/>
      </text>
      <text x="96" y="628" fill="#334155" opacity="0">passion = "AI + Code"
        <animate attributeName="opacity" to="1" begin="5.5s" dur="0.1s" fill="freeze"/>
      </text>
      <text x="96" y="656" fill="#334155" opacity="0">consistency = True
        <animate attributeName="opacity" to="1" begin="5.9s" dur="0.1s" fill="freeze"/>
      </text>
      <text x="96" y="684" fill="#0891b2" opacity="0">return passion + consistency
        <animate attributeName="opacity" to="1" begin="6.3s" dur="0.1s" fill="freeze"/>
      </text>
    </g>
  </g>

  <text x="60" y="720" font-family="Consolas, Menlo, monospace" font-size="20" font-weight="700" fill="#0e7490" opacity="0.9" style="letter-spacing:2px">
    KEEP CODING · KEEP GROWING
    <animate attributeName="opacity" values="0.9;0.3;0.9;0.9;0.25;0.9" keyTimes="0;0.05;0.09;0.6;0.63;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <g>
    <circle cx="1000" cy="360" r="158" fill="none" stroke="#0891b2" stroke-width="1.5" opacity="0.4"/>
    <circle cx="1000" cy="360" r="180" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.2"/>
    <clipPath id="revealClipL">
      <rect x="850" y="210" width="300" height="0">
        <animate attributeName="height" from="0" to="300" begin="1s" dur="1.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <g clip-path="url(#avatarClipL)">
      <g clip-path="url(#revealClipL)">
        <image href="https://avatars.githubusercontent.com/u/231112885?v=4" x="850" y="210" width="300" height="300" preserveAspectRatio="xMidYMid slice"/>
      </g>
    </g>
    <clipPath id="scanClipCircleL"><circle cx="1000" cy="360" r="150"/></clipPath>
    <g clip-path="url(#scanClipCircleL)">
      <rect x="850" y="210" width="300" height="14" fill="url(#scanGradL)">
        <animate attributeName="y" values="210;510;210" dur="3.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect x="0" y="0" width="1280" height="18" fill="url(#scanGradL)" opacity="0.6">
    <animate attributeName="y" values="0;740;0" dur="7s" repeatCount="indefinite"/>
  </rect>

