    <text x="60" y="215" opacity="0">&gt; AI &amp; Machine Learning Engineer in Progress
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.08;0.30;0.36;1" dur="9s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="215" opacity="0">&gt; Python &amp; C++ Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.36;0.38;0.64;0.66;1" dur="9s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="215" opacity="0">&gt; Building Real-World Projects 🚀
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.70;0.72;0.98;0.99;1" dur="9s" begin="2s" repeatCount="indefinite"/>
