<svg width="1280" height="740" viewBox="0 0 1280 740" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <clipPath id="roundedL"><rect x="0" y="0" width="1280" height="740" rx="28" ry="28"/></clipPath>
  <clipPath id="avatarClipL"><circle cx="1000" cy="360" r="150"/></clipPath>
  <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f8fbff"/>
    <stop offset="55%" stop-color="#eef4ff"/>
    <stop offset="100%" stop-color="#f5f9ff"/>
  </linearGradient>
  <linearGradient id="nameGradL" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0284c7"/>
    <stop offset="50%" stop-color="#0891b2"/>
    <stop offset="100%" stop-color="#6366f1">
      <animate attributeName="stop-color" values="#6366f1;#0284c7;#6366f1" dur="6s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0891b2" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="scanGradL" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0891b2" stop-opacity="0"/>
    <stop offset="50%" stop-color="#0891b2" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
  </linearGradient>
  <pattern id="gridL" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0H0V40" fill="none" stroke="#dbeafe" stroke-width="0.5"/>
  </pattern>
</defs>

<g clip-path="url(#roundedL)">
  <rect width="1280" height="740" fill="url(#bgL)"/>
  <rect width="1280" height="740" fill="url(#gridL)"/>
  <circle cx="150" cy="120" r="260" fill="url(#glowL)"/>
  <circle cx="1100" cy="620" r="220" fill="url(#glowL)"/>

  <text x="60" y="70" font-family="Consolas, Menlo, monospace" font-size="20" fill="#0891b2">
    <tspan>user@dev:~$ </tspan><tspan fill="#64748b">cat README.md</tspan>
  </text>
  <rect x="322" y="55" width="11" height="20" fill="#0891b2">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <g font-family="Georgia, 'Segoe Script', cursive" font-size="72" font-weight="700" fill="url(#nameGradL)">
    <text x="60" y="175" opacity="0">P<animate attributeName="opacity" to="1" begin="0.5s" dur="0.15s" fill="freeze"/></text>
    <text x="102" y="175" opacity="0">r<animate attributeName="opacity" to="1" begin="0.62s" dur="0.15s" fill="freeze"/></text>
    <text x="134" y="175" opacity="0">i<animate attributeName="opacity" to="1" begin="0.74s" dur="0.15s" fill="freeze"/></text>
    <text x="156" y="175" opacity="0">y<animate attributeName="opacity" to="1" begin="0.86s" dur="0.15s" fill="freeze"/></text>
    <text x="190" y="175" opacity="0">a<animate attributeName="opacity" to="1" begin="0.98s" dur="0.15s" fill="freeze"/></text>
    <text x="228" y="175" opacity="0">n<animate attributeName="opacity" to="1" begin="1.10s" dur="0.15s" fill="freeze"/></text>
    <text x="268" y="175" opacity="0">s<animate attributeName="opacity" to="1" begin="1.22s" dur="0.15s" fill="freeze"/></text>
    <text x="300" y="175" opacity="0">h<animate attributeName="opacity" to="1" begin="1.34s" dur="0.15s" fill="freeze"/></text>
    <text x="340" y="175" opacity="0">u<animate attributeName="opacity" to="1" begin="1.44s" dur="0.15s" fill="freeze"/></text>
    <text x="410" y="175" opacity="0">K<animate attributeName="opacity" to="1" begin="1.55s" dur="0.15s" fill="freeze"/></text>
    <text x="455" y="175" opacity="0">umar<animate attributeName="opacity" to="1" begin="1.67s" dur="0.15s" fill="freeze"/></text>
  </g>

